name: Auto-Update Zoh.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install requests
        run: pip install requests

      - name: Update Jio Token Strictly
        shell: python
        env:
          API_ENDPOINT_1: ${{ secrets.API_ENDPOINT_1 }}
          API_ENDPOINT_2: ${{ secrets.API_ENDPOINT_2 }}
          API_ENDPOINT_3: ${{ secrets.API_ENDPOINT_3 }}
          API_ENDPOINT_4: ${{ secrets.API_ENDPOINT_4 }}
          API_ENDPOINT_5: ${{ secrets.API_ENDPOINT_5 }}
        run: |
          import requests
          import os
          import re
          import sys

          FILE_NAME = "Zoh.m3u"
          ENDPOINTS = [
              os.environ.get("API_ENDPOINT_1"),
              os.environ.get("API_ENDPOINT_2"),
              os.environ.get("API_ENDPOINT_3"),
              os.environ.get("API_ENDPOINT_4"),
              os.environ.get("API_ENDPOINT_5")
          ]
          
          ENDPOINTS = [url for url in ENDPOINTS if url] 

          if not ENDPOINTS:
              print("Error: No API endpoints found. Please check GitHub Secrets.")
              sys.exit(1)

          headers = {"User-Agent": "Mozilla/5.0"}
          new_token_val = None

          # എൻഡ്‌പോയിന്റുകളിൽ നിന്ന് പുതിയ ടോക്കൺ മാത്രം കൃത്യമായി എടുക്കുന്നു
          for url in ENDPOINTS:
              try:
                  print(f"Trying to fetch token from: {url}")
                  response = requests.get(url, headers=headers, timeout=15)
                  if response.status_code == 200:
                      # 'st=' വെച്ച് തുടങ്ങുന്ന ടോക്കൺ മാത്രം വേർതിരിച്ചെടുക്കുന്നു
                      match = re.search(r'__hdnea__=(st=[a-zA-Z0-9~=/*_-]+)', response.text)
                      if match:
                          new_token_val = match.group(1)
                          print("Successfully fetched the new Jio token.")
                          break
              except Exception as e:
                  print(f"Failed to fetch {url}: {e}")
                  continue

          if not new_token_val:
              print("Error: Could not find __hdnea__ token from any endpoint.")
              sys.exit(1)

          if not os.path.exists(FILE_NAME):
              print(f"Error: {FILE_NAME} not found.")
              sys.exit(1)

          with open(FILE_NAME, "r", encoding="utf-8") as f:
              lines = f.readlines()

          new_lines = []
          
          # ഫയലിലെ പഴയ ടോക്കൺ മാത്രം മാറ്റി പുതിയത് വെക്കുന്നു (ബാക്കി ഡാറ്റ നിലനിർത്തുന്നു)
          for line in lines:
              if "__hdnea__=" in line:
                  # ടോക്കൺ അക്ഷരങ്ങൾ മാത്രം മാറ്റി റീപ്ലേസ് ചെയ്യുന്നു
                  line = re.sub(r'__hdnea__=[a-zA-Z0-9~=/*_-]+', f'__hdnea__={new_token_val}', line)
              new_lines.append(line)

          with open(FILE_NAME, "w", encoding="utf-8") as f:
              f.writelines(new_lines)
          print("Jio tokens updated strictly. Rest of the link is untouched.")

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Zoh.m3u
          if ! git diff --cached --quiet; then
            git commit -m "Auto update only Jio tokens securely"
            git push
          else
            echo "No changes to commit."
          fi

