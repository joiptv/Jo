name: Auto Update Zoh Playlist

on:
  schedule:
    - cron: '*/30 * * * *'  # ഓരോ 30 മിനിറ്റിലും റൺ ചെയ്യും
  workflow_dispatch:

permissions:
  contents: write   # 🔥 ഇത് നിർബന്ധമാണ് push ചെയ്യാൻ

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4   # 🔥 latest version

      - name: Set up Python
        uses: actions/setup-python@v5   # 🔥 latest version
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Update Script
        env:
          ENDPOINT_1: ${{ secrets.ENDPOINT_1 }}
          ENDPOINT_2: ${{ secrets.ENDPOINT_2 }}
          ENDPOINT_3: ${{ secrets.ENDPOINT_3 }}
          ENDPOINT_4: ${{ secrets.ENDPOINT_4 }}
          ENDPOINT_5: ${{ secrets.ENDPOINT_5 }}
        run: python update_playlist.py

      - name: Commit and Push Changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          git add Zoh.m3u

          # മാറ്റം ഉണ്ടെങ്കിൽ മാത്രം commit
          if ! git diff --cached --quiet; then
            git commit -m "Auto-updated playlist"
            git push
          else
            echo "No changes to commit"
          fi
