name: Sync Jojo File from External Link

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update_jojo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4.2.2

      - name: Download Updated File
        run: |
          curl -L "https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u" -o temp.m3u
          channels=("Asianet" "Zeekeralam" "Flower") 
          > Jojo.m3u # Clear file first
          for channel in "${channels[@]}"; do
            grep "$channel" temp.m3u >> Jojo.m3u
          done

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Jojo.m3u
          
          # Only proceed if changes are detected
          if ! git diff --cached --quiet; then
            git commit -m "chore: update Jojo.m3u from external source"
            git push origin main
          else
            echo "No updates to sync."
          fi
