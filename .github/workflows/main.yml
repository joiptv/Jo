name: Update Zoh.m3u Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" 

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Generate Playlist
        run: |
          # Install dependencies within the same shell session
          pip install requests
          
          # Run the python script
          python3 -c "
          import requests
          
          SOURCE_URL = 'https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u'
          OUTPUT_FILE = 'Zoh.m3u'
          REQUIRED_FILE = 'wanted_channels.txt'
          
          # Read wanted channels safely
          try:
              with open(REQUIRED_FILE, 'r', encoding='utf-8') as f:
                  wanted = [line.strip().upper() for line in f if line.strip()]
          except FileNotFoundError:
              print(f'Error: {REQUIRED_FILE} not found.')
              exit(1)
          
          response = requests.get(SOURCE_URL)
          response.raise_for_status() # Check for request errors
          lines = response.text.splitlines()
          
          new_m3u = ['#EXTM3U']
          for i in range(len(lines)):
              if '#EXTINF' in lines[i]:
                  if any(w in lines[i].upper() for w in wanted):
                      new_m3u.append(lines[i])
                      # Ensure we don't go out of bounds
                      if i + 1 < len(lines):
                          new_m3u.append(lines[i+1])
          
          with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
              f.write('\n'.join(new_m3u))
          "

      - name: Commit & Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Zoh.m3u
          if ! git diff --cached --quiet; then
            git commit -m 'Auto-update Zoh.m3u'
            git push
          else
            echo 'No changes detected'
          fi
