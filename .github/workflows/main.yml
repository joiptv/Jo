name: Auto-Update and Verify Zoh.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Update Playlist Token
        env:
          API_ENDPOINT_1: ${{ secrets.API_ENDPOINT_1 }}
          API_ENDPOINT_2: ${{ secrets.API_ENDPOINT_2 }}
          API_ENDPOINT_3: ${{ secrets.API_ENDPOINT_3 }}
          API_ENDPOINT_4: ${{ secrets.API_ENDPOINT_4 }}
          API_ENDPOINT_5: ${{ secrets.API_ENDPOINT_5 }}
        shell: python
        run: |
          import os
          import requests
          import re
          import sys

          FILE_NAME = "Zoh.m3u"
          
          # ഫയൽ വായിക്കുന്നു
          try:
              with open(FILE_NAME, "r", encoding="utf-8") as f:
                  content = f.read()
          except FileNotFoundError:
              print(f"Error: {FILE_NAME} not found.")
              sys.exit(1)

          raw_endpoints = [
              os.environ.get("API_ENDPOINT_1"),
              os.environ.get("API_ENDPOINT_2"),
              os.environ.get("API_ENDPOINT_3"),
              os.environ.get("API_ENDPOINT_4"),
              os.environ.get("API_ENDPOINT_5")
          ]
          ENDPOINTS = [ep for ep in raw_endpoints if ep]

          new_token = None
          
          # ഓരോ എൻഡ് പോയിന്റും പരിശോധിച്ച് ടോക്കൺ എടുക്കുന്നു
          for url in ENDPOINTS:
              try:
                  print(f"Checking endpoint: {url}")
                  # നിങ്ങളുടെ എപിഐ ആയതുകൊണ്ട് സാധാരണ ഹെഡർ മതി
                  response = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=10)
                  
                  if response.status_code == 200:
                      temp_token = response.text.strip()
                      
                      # കിട്ടിയ ടോക്കണിൽ 'st=' ഉം 'exp=' ഉം ഉണ്ടെങ്കിൽ അത് യഥാർത്ഥ ടോക്കൺ ആയി കണക്കാക്കും
                      if "st=" in temp_token and "exp=" in temp_token:
                          print(f"Valid token format found at {url}")
                          new_token = temp_token
                          break # ടോക്കൺ കിട്ടിയാൽ അടുത്ത എപിഐ നോക്കില്ല
                      else:
                          print(f"Invalid token received from {url}. Moving to next...")
              except Exception as e:
                  print(f"Failed to fetch from {url}: {e}")
                  
          if not new_token:
              print("Error: Could not fetch a valid token from any endpoints.")
              sys.exit(1)
              
          # വർക്കിംഗ് ആയ ടോക്കൺ വെച്ച് ഫയലിലെ എല്ലാ പഴയ ടോക്കണുകളും അപ്ഡേറ്റ് ചെയ്യുന്നു
          updated_content = re.sub(r'__hdnea__=st=\d+~exp=\d+~acl=[^~&"]+~hmac=[a-f0-9]+', f'__hdnea__={new_token}', content)
          
          with open(FILE_NAME, "w", encoding="utf-8") as f:
              f.write(updated_content)
              
          print(f"Successfully updated {FILE_NAME} with the new token.")

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Zoh.m3u
          # എന്തെങ്കിലും മാറ്റം വന്നിട്ടുണ്ടെങ്കിൽ മാത്രം കമ്മിറ്റ് ചെയ്യുക
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Jio tokens"
          git push
