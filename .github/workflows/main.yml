name: Auto-Update Zoh.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Update Playlist with Failover
        shell: python
        env:
          API_ENDPOINT_1: ${{ secrets.API_ENDPOINT_1 }}
          API_ENDPOINT_2: ${{ secrets.API_ENDPOINT_2 }}
          API_ENDPOINT_3: ${{ secrets.API_ENDPOINT_3 }}
          API_ENDPOINT_4: ${{ secrets.API_ENDPOINT_4 }}
          API_ENDPOINT_5: ${{ secrets.API_ENDPOINT_5 }}
        run: |
          import requests
          import os
          import re
          import sys

          FILE_NAME = "Zoh.m3u"
          ENDPOINTS = [
              os.environ.get("API_ENDPOINT_1"),
              os.environ.get("API_ENDPOINT_2"),
              os.environ.get("API_ENDPOINT_3"),
              os.environ.get("API_ENDPOINT_4"),
              os.environ.get("API_ENDPOINT_5")
          ]
          
          # ഫ്രീയായ അല്ലെങ്കിൽ സെറ്റ് ചെയ്യാത്ത എൻഡ്‌പോയിന്റുകൾ ഒഴിവാക്കാൻ
          ENDPOINTS = [url for url in ENDPOINTS if url] 

          headers = {"User-Agent": "Mozilla/5.0"}
          source_channels = {}

          # എൻഡ്‌പോയിന്റുകൾ പരിശോധിച്ച് ഡാറ്റ എടുക്കുന്നു
          for url in ENDPOINTS:
              try:
                  response = requests.get(url, headers=headers, timeout=15)
                  if response.status_code == 200:
                      lines = response.text.splitlines()
                      current_channel = None
                      for line in lines:
                          line = line.strip()
                          if line.startswith("#EXTINF"):
                              match = re.search(r',(.*)$', line)
                              if match:
                                  current_channel = match.group(1).strip().lower()
                          elif line and not line.startswith("#") and current_channel:
                              if current_channel not in source_channels:
                                  source_channels[current_channel] = line
                              current_channel = None
                      break # ആദ്യത്തെ വർക്കിംഗ് ലിങ്ക് കിട്ടിയാൽ ലൂപ്പ് നിർത്തുന്നു
              except Exception as e:
                  print(f"Failed to fetch {url}: {e}")
                  continue

          if not source_channels:
              print("Error: Could not fetch channels from any endpoint.")
              sys.exit(1)

          # നിലവിലെ Zoh.m3u ഫയൽ വായിക്കുന്നു
          try:
              with open(FILE_NAME, "r", encoding="utf-8") as f:
                  user_lines = f.readlines()
          except FileNotFoundError:
              print(f"Error: {FILE_NAME} not found.")
              sys.exit(1)

          new_lines = []
          current_user_channel = None

          # നിലവിലെ പ്ലേലിസ്റ്റിലെ ലിങ്കുകൾ പുതിയവ ഉപയോഗിച്ച് മാറ്റുന്നു
          for line in user_lines:
              if line.strip().startswith("#EXTINF"):
                  match = re.search(r',(.*)$', line.strip())
                  if match:
                      current_user_channel = match.group(1).strip().lower()
                  new_lines.append(line)
              elif line.strip() and not line.strip().startswith("#") and current_user_channel:
                  if current_user_channel in source_channels:
                      new_url = source_channels[current_user_channel]
                      new_lines.append(new_url + "\n")
                  else:
                      new_lines.append(line)
                  current_user_channel = None
              else:
                  new_lines.append(line)

          # പുതിയ ഡാറ്റ ഫയലിലേക്ക് സേവ് ചെയ്യുന്നു
          with open(FILE_NAME, "w", encoding="utf-8") as f:
              f.writelines(new_lines)
          print(f"{FILE_NAME} updated successfully.")

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Zoh.m3u
          if ! git diff --cached --quiet; then
            git commit -m "Auto update playlist with 5-endpoint failover logic"
            git push
          else
            echo "No changes to commit."
