name: Auto-Update and Verify Zoh.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch, Test and Update Playlist
        env:
          API_ENDPOINT_1: ${{ secrets.API_ENDPOINT_1 }}
          API_ENDPOINT_2: ${{ secrets.API_ENDPOINT_2 }}
          API_ENDPOINT_3: ${{ secrets.API_ENDPOINT_3 }}
          API_ENDPOINT_4: ${{ secrets.API_ENDPOINT_4 }}
          API_ENDPOINT_5: ${{ secrets.API_ENDPOINT_5 }}
        shell: python
        run: |
          import os
          import requests
          import re
          import sys

          FILE_NAME = "Zoh.m3u"
          
          # 1. നിങ്ങളുടെ ഫയൽ വായിക്കുന്നു
          try:
              with open(FILE_NAME, "r", encoding="utf-8") as f:
                  content = f.read()
          except FileNotFoundError:
              print(f"Error: {FILE_NAME} not found.")
              sys.exit(1)

          # 2. ഫയലിൽ നിന്ന് ഒരു യഥാർത്ഥ ജിയോ ലിങ്ക് ഓട്ടോമാറ്റിക് ആയി കണ്ടുപിടിക്കുന്നു (മാന്വൽ അല്ല)
          match = re.search(r'(https://[^"\'\s]+\.(?:mpd|m3u8))\?__hdnea__=', content)
          if not match:
              print("Error: Could not find a valid Jio stream URL in the M3U file to test.")
              sys.exit(1)
          
          base_test_url = match.group(1)
          print(f"Auto-detected test stream from file: {base_test_url}")

          # 3. ജിയോ വീഡിയോ പ്ലേ ചെയ്യാൻ ആവശ്യമായ ശരിയായ User-Agent
          headers = {
              "User-Agent": "plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0"
          }

          raw_endpoints = [
              os.environ.get("API_ENDPOINT_1"),
              os.environ.get("API_ENDPOINT_2"),
              os.environ.get("API_ENDPOINT_3"),
              os.environ.get("API_ENDPOINT_4"),
              os.environ.get("API_ENDPOINT_5")
          ]
          ENDPOINTS = [ep for ep in raw_endpoints if ep]

          def is_stream_working(url):
              try:
                  response = requests.get(url, headers=headers, stream=True, timeout=5)
                  if response.status_code == 200:
                      return True
                  return False
              except Exception:
                  return False

          new_token = None
          
          for url in ENDPOINTS:
              try:
                  print(f"Checking endpoint: {url}")
                  response = requests.get(url, headers=headers, timeout=10)
                  
                  if response.status_code == 200:
                      temp_token = response.text.strip()
                      
                      # ഫയലിൽ നിന്ന് എടുത്ത ലിങ്കിലേക്ക് പുതിയ ടോക്കൺ ചേർത്ത് ടെസ്റ്റ് ചെയ്യുന്നു
                      test_url_with_token = f"{base_test_url}?__hdnea__={temp_token}"
                      
                      if is_stream_working(test_url_with_token):
                          print(f"Working token found at {url} and stream is LIVE!")
                          new_token = temp_token
                          break
                      else:
                          print(f"Token found at {url}, but stream is NOT working (Blocked or Expired).")
              except Exception as e:
                  print(f"Failed to fetch from {url}: {e}")
                  
          if not new_token:
              print("Error: No working stream found from any endpoints.")
              sys.exit(1)
              
          # 4. വർക്കിംഗ് ആയ ടോക്കൺ വെച്ച് ഫയലിലെ എല്ലാ പഴയ ടോക്കണുകളും അപ്ഡേറ്റ് ചെയ്യുന്നു
          updated_content = re.sub(r'__hdnea__=st=\d+~exp=\d+~acl=[^~&"]+~hmac=[a-f0-9]+', f'__hdnea__={new_token}', content)
          
          with open(FILE_NAME, "w", encoding="utf-8") as f:
              f.write(updated_content)
              
          print(f"Successfully updated {FILE_NAME} with a working token.")

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Zoh.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update working Jio tokens"
          git push
