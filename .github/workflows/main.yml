name: Auto-Update Zoh.M3u

on:
workflow_dispatch:
schedule:
- cron: "0 */1 * * *"

env:
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
contents: write

jobs:
update-playlist:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4
    with:
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: "3.x"

  - name: Install requests
    run: pip install requests

  - name: Run Update Script
    run: |
      cat << 'EOF' > update_script.py
      import requests
      import re
      import sys

      FILE_NAME = "Zoh.M3u"
      JIO_SOURCE = "https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u"
      ZEE_SOURCE = "https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u"

      headers = {"User-Agent": "Mozilla/5.0"}

      print("Fetching Jio token...")
      jio_token = None
      try:
          r = requests.get(JIO_SOURCE, headers=headers, timeout=15)
          m = re.search(r'(__hdnea__=[^"&\\s]*)', r.text)
          if m:
              jio_token = m.group(1)
      except:
          pass

      print("Fetching Zee token...")
      zee_token = None
      try:
          r = requests.get(ZEE_SOURCE, headers=headers, timeout=15)
          m = re.search(r'(hdntl=[^"\'\\s]*)', r.text)
          if m:
              zee_token = m.group(1)
      except:
          pass

      if not jio_token and not zee_token:
          print("Token fetch failed")
          sys.exit(1)

      with open(FILE_NAME, "r", encoding="utf-8") as f:
          lines = f.readlines()

      new_lines = []
      in_block = False

      for line in lines:
          s = line.strip()

          if s == "# >>> JIO_AUTO_START":
              in_block = True
              new_lines.append(line)
              continue

          if s == "# >>> JIO_AUTO_END":
              in_block = False
              new_lines.append(line)
              continue

          if in_block:

              if jio_token and ".mpd" in s:
                  base = s.split(".mpd")[0] + ".mpd"
                  new_lines.append(f"{base}?{jio_token}\n")
                  continue

              if zee_token and ".m3u8" in s:
                  base = s.split(".m3u8")[0] + ".m3u8"
                  new_lines.append(f"{base}?{zee_token}\n")
                  continue

          new_lines.append(line)

      with open(FILE_NAME, "w", encoding="utf-8") as f:
          f.writelines(new_lines)

      print("Playlist updated")
      EOF

      python update_script.py

  - name: Commit & Push
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"

      git add Zoh.M3u

      if git diff --cached --quiet; then
        echo "No changes detected"
        exit 0
      fi

      git commit -m "Auto-update Jio & Zee tokens"
      git push
